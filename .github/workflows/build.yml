name: Build Tandora

on:
  push:
    branches: ["**"]

env:
  GODOT_VERSION: "4.7"
  EXPORT_PRESET_LINUX: "Linux"
  EXPORT_PRESET_WEB: "Web"

jobs:
  # ── Build Linux server binary ─────────────────────────────────────────────
  build-linux:
    name: Build Linux Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version.cfg
        run: chmod +x ./update_version.sh && ./update_version.sh

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          TEMPLATES_FILENAME="Godot_v${GODOT_VERSION}-stable_export_templates.tpz"

          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_FILENAME}.zip"
          unzip -q "${GODOT_FILENAME}.zip"
          mkdir -p ~/.local/bin
          mv "${GODOT_FILENAME}" ~/.local/bin/godot
          chmod +x ~/.local/bin/godot
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${TEMPLATES_FILENAME}"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q "${TEMPLATES_FILENAME}" -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Export Linux
        run: |
          mkdir -p build_linux
          godot --headless --export-release "${{ env.EXPORT_PRESET_LINUX }}" "build_linux/tandora.x86_64"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: tandora-linux-server
          retention-days: 30
          path: build_linux/

  # ── Build Web export ──────────────────────────────────────────────────────
  build-web:
    name: Build Web Export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version.cfg
        run: chmod +x ./update_version.sh && ./update_version.sh

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          TEMPLATES_FILENAME="Godot_v${GODOT_VERSION}-stable_export_templates.tpz"

          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_FILENAME}.zip"
          unzip -q "${GODOT_FILENAME}.zip"
          mkdir -p ~/.local/bin
          mv "${GODOT_FILENAME}" ~/.local/bin/godot
          chmod +x ~/.local/bin/godot
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${TEMPLATES_FILENAME}"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q "${TEMPLATES_FILENAME}" -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Export Web
        run: |
          mkdir -p build_web
          godot --headless --export-release "${{ env.EXPORT_PRESET_WEB }}" "build_web/index.html"

      - name: Inject cache-busting meta tag
        run: |
          sed -i 's|<head>|<head>\n  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n  <meta http-equiv="Pragma" content="no-cache">\n  <meta http-equiv="Expires" content="0">|' build_web/index.html

      - name: Deploy to GitHub Pages repo
        if: github.ref == 'refs/heads/master'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone https://x-access-token:${{ secrets.PAGES_DEPLOY_TOKEN }}@github.com/NuclearQuads/nuclearquads.github.io.git pages_repo
          rm -rf pages_repo/tandora
          cp -r build_web pages_repo/tandora
          # Remove any .nojekyll that Godot added inside the tandora folder
          rm -f pages_repo/tandora/.nojekyll
          # Remove .nojekyll from repo root if it snuck in
          rm -f pages_repo/.nojekyll
          cd pages_repo
          git add tandora/
          git add -u .nojekyll 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Deploy Tandora web build from ${{ github.sha }}"
          git push
